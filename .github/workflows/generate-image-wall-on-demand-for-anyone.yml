name: generate-image-wall-demo-for-anyone

on:
  workflow_dispatch:
    inputs:
      doubanId:
        description: 'douban id:'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false

    steps:
      - name: checkout repo content
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: execute py script to generate movie poster wall
        run: python image_wall.py -i=${{ github.event.inputs.doubanId }} -c=30 -r=15 -o=8 -rd=True
        
      - name: archive results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.doubanId }}
          retention-days: 1
          path: |
            output/${{ github.event.inputs.doubanId }}_movie.jpg
          overwrite: true
